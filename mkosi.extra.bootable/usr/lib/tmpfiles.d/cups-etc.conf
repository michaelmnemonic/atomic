# Create cups config directory with proper permissions
d /etc/cups 0755 root lp -
d /etc/cups/interfaces 0755 root lp -
d /etc/cups/ppd 0755 root lp -
d /etc/cups/ssl 0700 root lp -

# Link default configuration files from factory
L /etc/cups/cups-browsed.conf
L /etc/cups/cupsd.conf
L /etc/cups/cups-files.conf
L /etc/cups/cups-pdf.conf
L /etc/cups/raw.convs
L /etc/cups/raw.types
L /etc/cups/snmp.conf

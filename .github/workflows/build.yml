name: Build output artifacts

on:
  push:
    branches:
    - sid
  workflow_dispatch:    # Allows manual triggering

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.host }}

    steps:
      - name: Install mkosi
        uses: systemd/mkosi@v26

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decrypt secrets
        run: |
          gpg --quiet --batch --yes --decrypt --passphrase="$SECRET_KEY" --output mkosi.key mkosi.key.gpg
          gpg --quiet --batch --yes --decrypt --passphrase="$SECRET_KEY" --output mkosi.crt mkosi.crt.gpg
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY}}

      - name: Build the image
        run: |
          mkosi build --force

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          path: mkosi.outputs/*
      

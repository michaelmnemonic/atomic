name: Build output artifacts

on:
  push:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:    # Allows manual triggering

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.host }}

    steps:
      - name: Update repositories
        run: |
          sudo apt -y update

      - name: Install mkosi
        uses: systemd/mkosi@v26

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Build the image
        run: |
          gpg --quiet --batch --yes --decrypt --passphrase="$SECRET_KEY" --output mkosi.key mkosi.key.gpg
          chmod 700 mkosi.key
          gpg --quiet --batch --yes --decrypt --passphrase="$SECRET_KEY" --output mkosi.crt mkosi.crt.gpg
          chmod 700 mkosi.crt
          mkosi build --force
          rm mkosi.key
          rm mkosi.crt
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY}}

      - name: Upload base arm64 tar
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base-arm64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_arm64.tar.zst
          retention-days: 7
      - name: Upload base arm64 manifest
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base-arm64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_arm64.manifest
      - name: Upload base x86-64 tar
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base-x86-64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_x86-64.tar.zst
          retention-days: 7
      - name: Upload base x86-64 manifest
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base-x86-64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_x86-64.manifest
      - name: Upload charon arm64 raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.raw
          retention-days: 7
      - name: Upload charon arm64 usr raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.usr-arm64.*.raw
          retention-days: 7
      - name: Upload charon arm64 usr verity raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-verity-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.usr-arm64-verity.*.raw
          retention-days: 7
      - name: Upload charon arm64 usr verity sig raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-verity-sig-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.usr-arm64-verity-sig.*.raw
          retention-days: 7
      - name: Upload juno x86-64 raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-raw
          archive: false  
          if-no-files-found: ignore   
          path: mkosi.output/juno_*_x86-64.raw
          retention-days: 7
      - name: Upload juno x86-64 usr raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.usr-x86-64.*.raw
          retention-days: 7
      - name: Upload juno x86-64 usr verity raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-verity-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.usr-x86-64-verity.*.raw
          retention-days: 7
      - name: Upload juno x86-64 usr verity sig raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-verity-sig-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.usr-x86-64-verity-sig.*.raw
          retention-days: 7
  release:
    if: github.ref == 'refs/heads/sid'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: mkosi.output
          merge-multiple: true

      - name: Release main branch
        uses: andelf/nightly-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: main
          draft: false
          name: 'Atomic main branch $(./mkosi.version)'
          prerelease: true
          body: |
            This release contains the current HEAD of the main branch.
            It's unstable compared to the tagged releases, **use it with caution**!
          files: |
            mkosi.output/base_*_arm64.tar.zst
            mkosi.output/base_*_x86-64.manifest
            mkosi.output/charon_*_arm64.usr-arm64.*.raw
            mkosi.output/charon_*_arm64.usr-arm64-verity.*.raw
            mkosi.output/charon_*_arm64.usr-arm64-verity-sig.*.raw
            mkosi.output/juno_*_x86-64.usr-x86-64.*.raw
            mkosi.output/juno_*_x86-64.usr-x86-64-verity.*.raw
            mkosi.output/juno_*_x86-64.usr-x86-64-verity-sig.*.raw

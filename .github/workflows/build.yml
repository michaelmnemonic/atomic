          retention-days: 1
      - name: Upload base+kde arm64 tar
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base+kde-arm64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+kde_*_arm64.tar.zst
          retention-days: 1
      - name: Upload base+kde arm64 checksum
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base+kde-arm64-tar-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+kde_*_arm64.SHA256SUMS
          retention-days: 1
      - name: Upload base+kde arm64 manifest
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base+kde-arm64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+kde_*_arm64.manifest
          retention-days: 1
      - name: Upload base+kde x86-64 tar
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base+kde-x86-64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+kde_*_x86-64.tar.zst
          retention-days: 1
      - name: Upload base+kde x86-64 checksum
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base+kde-x86-64-tar-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+kde_*_x86-64.SHA256SUMS
          retention-days: 1
      - name: Upload base+kde x86-64 manifest
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base+kde-x86-64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+kde_*_x86-64.manifest
          retention-days: 1
      - name: Upload charon arm64 raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.raw
          retention-days: 1
      - name: Upload charon arm64 efi
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-efi
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.efi
          retention-days: 1 
      - name: Upload charon arm64 usr raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.usr-arm64.*.raw
          retention-days: 1
      - name: Upload charon arm64 usr verity raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-verity-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.usr-arm64-verity.*.raw
          retention-days: 1
      - name: Upload charon arm64 usr verity sig raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-verity-sig-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.usr-arm64-verity-sig.*.raw
          retention-days: 1
      - name: Upload charon arm64 checksum
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: charon-arm64-usr-verity-sig-raw-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/charon_*_arm64.SHA256SUMS
          retention-days: 1
      - name: Upload juno x86-64 raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-raw
          archive: false  
          if-no-files-found: ignore   
          path: mkosi.output/juno_*_x86-64.raw
          retention-days: 1
      - name: Upload juno x86-64 efi
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-efi
          archive: false  
          if-no-files-found: ignore   
          path: mkosi.output/juno_*_x86-64.efi
          retention-days: 1
      - name: Upload juno x86-64 usr raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.usr-x86-64.*.raw
          retention-days: 1
      - name: Upload juno x86-64 usr verity raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-verity-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.usr-x86-64-verity.*.raw
          retention-days: 1
      - name: Upload juno x86-64 usr verity sig raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-verity-sig-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.usr-x86-64-verity-sig.*.raw
          retention-days: 1
      - name: Upload juno x86-64 checksum
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: juno-x86-64-usr-verity-sig-raw-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/juno_*_x86-64.SHA256SUMS
          retention-days: 1
      - name: Upload vscode arm64 raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-arm64-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/vscode_*_arm64.raw
          retention-days: 1
      - name: Upload vscode arm64 checksum
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-arm64-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/vscode*_arm64.SHA256SUMS
          retention-days: 1
      - name: Upload vscode arm64 manifest
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-arm64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/vscode*_arm64.manifest
          retention-days: 1
      - name: Upload vscode x86-64 raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-x86-64-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/vscode_*_x86-64.raw
          retention-days: 1
      - name: Upload vscode x86-64 checksum
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-x86-64-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/vscode*_x86-64.SHA256SUMS
          retention-days: 1
      - name: Upload vscode x86-64 manifest
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-x86-64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/vscode*_x86-64.manifest
          retention-days: 1
      - name: Upload llamacpp arm64 raw
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: llamacpp-arm64-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/llamacpp_*_arm64.raw
          retention-days: 1
      - name: Upload llamacpp arm64 checksum
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: llamacpp-arm64-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/llamacpp*_arm64.SHA256SUMS
          retention-days: 1
      - name: Upload llamacpp arm64 manifest
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: llamacpp-arm64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/llamacpp*_arm64.manifest
          retention-days: 1
      - name: Upload llamacpp x86-64 raw
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: llamacpp-x86-64-raw
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/llamacpp_*_x86-64.raw
          retention-days: 1
      - name: Upload llamacpp x86-64 checksum
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: llamacpp-x86-64-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/llamacpp*_x86-64.SHA256SUMS
          retention-days: 1
      - name: Upload llamacpp x86-64 manifest
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: llamacpp-x86-64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/llamacpp*_x86-64.manifest
          retention-days: 1

  upload:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: mkosi.output
          merge-multiple: true
      - name: Upload files
        env:
          USER: ${{ secrets.USER }}
          PASSWORD: ${{ secrets.PASSWORD }}
          HOST: ${{ secrets.HOST }}
        run: |
          shopt -s nullglob
          base_url="${HOST%/}"
          for file in mkosi.output/base_*_arm64.tar.zst \
                      mkosi.output/base_*_arm64.manifest \
                      mkosi.output/base_*_x86-64.tar.zst \
                      mkosi.output/base_*_x86-64.manifest \
                      mkosi.output/charon_*_arm64.efi \
                      mkosi.output/charon_*_arm64.usr-arm64.*.raw \
                      mkosi.output/charon_*_arm64.usr-arm64-verity.*.raw \
                      mkosi.output/charon_*_arm64.usr-arm64-verity-sig.*.raw \
                      mkosi.output/juno_*_x86-64.efi \
                      mkosi.output/juno_*_x86-64.usr-x86-64.*.raw \
                      mkosi.output/juno_*_x86-64.usr-x86-64-verity.*.raw \
                      mkosi.output/juno_*_x86-64.usr-x86-64-verity-sig.*.raw \
                      mkosi.output/vscode_*_arm64.raw \
                      mkosi.output/vscode_*_arm64.manifest \
                      mkosi.output/vscode_*_arm64.SHA256SUMS \
                      mkosi.output/vscode_*_x86-64.raw \
                      mkosi.output/vscode_*_x86-64.manifest \
                      mkosi.output/llamacpp_*_arm64.raw \
                      mkosi.output/llamacpp_*_arm64.manifest \
                      mkosi.output/llamacpp_*_x86-64.raw \
                      mkosi.output/llamacpp_*_x86-64.manifest; do
            remote_url="$base_url/$(basename "$file")"
            if curl --silent --show-error --fail --head -u "$USER:$PASSWORD" "$remote_url" >/dev/null; then
              echo "Skipping existing file: $(basename "$file")"
              continue
            fi

            curl --fail --show-error -L -T "$file" -u "$USER:$PASSWORD" "$remote_url"
          done

          # Consolidate SHA256SUMS
          cat mkosi.output/*.SHA256SUMS > new_hashes
          if curl --silent --show-error --fail -u "$USER:$PASSWORD" "$base_url/SHA256SUMS" -o old_hashes; then
              awk '!seen[$2]++' new_hashes old_hashes > SHA256SUMS
          else
              cat new_hashes > SHA256SUMS
          fi
          
          # Import signing key and sign the consolidated SHA256SUMS
          gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.SECRET_KEY }}" --output signing.key signing.key.gpg
          gpg --batch --import signing.key
          rm signing.key
          gpg --batch --yes --armor --detach-sign --local-user michaelmnemonic@posteo.eu SHA256SUMS
          gpg --batch --yes --armor --detach-sign --local-user michaelmnemonic@posteo.eu --output SHA256SUMS.gpg SHA256SUMS
          
          # Upload SHA256SUMS and its signatures
          curl --fail --show-error -L -T "SHA256SUMS" -u "$USER:$PASSWORD" "$base_url/SHA256SUMS"
          curl --fail --show-error -L -T "SHA256SUMS.asc" -u "$USER:$PASSWORD" "$base_url/SHA256SUMS.asc"
          curl --fail --show-error -L -T "SHA256SUMS.gpg" -u "$USER:$PASSWORD" "$base_url/SHA256SUMS.gpg"

name: Build output artifacts

on:
  push:
    paths:
      - 'mkosi.conf'
      - 'mkosi.version'
      - 'mkosi.conf.d/**'
      - 'mkosi.images/**'
      - 'mkosi.extra.bootable/**'
      - 'mkosi.repart/**'
      - 'mkosi.sandbox/**'
      - 'mkosi.sysupdate/**'
      - 'mkosi.key.gpg'
      - 'mkosi.crt.gpg'
      - 'signing.key.gpg'
      - 'microsoft.gpg'
      - '.github/workflows/build.yml'
  workflow_dispatch:    # Allows manual triggering

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.host }}

    steps:
      - name: Update repositories
        run: |
          sudo apt -y update

      - name: Install mkosi
        uses: systemd/mkosi@v26

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Build the image
        run: |
          gpg --quiet --batch --yes --decrypt --passphrase="$SECRET_KEY" --output mkosi.key mkosi.key.gpg
          chmod 700 mkosi.key
          gpg --quiet --batch --yes --decrypt --passphrase="$SECRET_KEY" --output mkosi.crt mkosi.crt.gpg
          chmod 700 mkosi.crt
          mkosi build --force
          rm mkosi.key
          rm mkosi.crt
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY}}

      - name: Upload base arm64 tar
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base-arm64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_arm64.tar.zst
          retention-days: 1
      - name: Upload base arm64 checksum
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base-arm64-tar-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_arm64.SHA256SUMS
          retention-days: 1
      - name: Upload base arm64 manifest
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base-arm64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_arm64.manifest
          retention-days: 1
      - name: Upload base x86-64 tar
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base-x86-64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_x86-64.tar.zst
          retention-days: 1
      - name: Upload base x86-64 checksum
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base-x86-64-tar-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_x86-64.SHA256SUMS
          retention-days: 1
      - name: Upload base x86-64 manifest
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base-x86-64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base_*_x86-64.manifest
          retention-days: 1
      - name: Upload base+gnome arm64 tar
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base+gnome-arm64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+gnome_*_arm64.tar.zst
          retention-days: 1
      - name: Upload base+gnome arm64 checksum
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base+gnome-arm64-tar-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+gnome_*_arm64.SHA256SUMS
          retention-days: 1
      - name: Upload base+gnome arm64 manifest
        if: matrix.host == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: base+gnome-arm64-manifest
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+gnome_*_arm64.manifest
          retention-days: 1
      - name: Upload base+gnome x86-64 tar
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base+gnome-x86-64-tar
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+gnome_*_x86-64.tar.zst
          retention-days: 1
      - name: Upload base+gnome x86-64 checksum
        if: matrix.host == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: base+gnome-x86-64-tar-checksum
          archive: false     
          if-no-files-found: ignore
          path: mkosi.output/base+gnome_*_x86-64.SHA256SUMS

name: Bump debian snapshot

on:
  workflow_dispatch:    # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Bump snapshot
        run: |
          .scripts/bump_snapshot.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit-message: Bump debian snapshot
          branch: bump-debian-snapshot
          delete-branch: true
          title: Bump debian snapshot

[Output]
Format=tar
SplitArtifacts=tar
ImageId=base+kde
Output=%i_%v_%a
ManifestFormat=json

[Content]
BaseTrees=%O/base_%v_%a
Bootable=no
CleanPackageMetadata=no
Packages=
        akonadi-backend-sqlite
        ark
        bluedevil
        breeze-gtk-theme
        dolphin
        firefox
        fonts-inter
        fonts-noto
        fonts-noto-cjk
        fonts-noto-color-emoji
        gwenview
        kde-config-gtk-style
        kde-config-sddm
        kde-plasma-desktop
        kde-spectacle
        kgamma
        kinfocenter
        kmail
        konsole
        kscreen
        ksshaskpass
        kwrited
        libpam-kwallet5
        ocean-sound-theme
        okular
        plasma-desktop
        plasma-disks
        plasma-nm
        plasma-pa
        plasma-systemmonitor
        plasma-thunderbolt
        plasma-welcome
        plasma-workspace-wallpapers
        powerdevil
        sddm
        sddm-theme-breeze
        xdg-desktop-portal-kde
        xdg-desktop-portal-gtk
        xsettings-kde
RemovePackages=
        xserver-xorg

[Validation]
Checksum=yes

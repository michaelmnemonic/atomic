[Match]
Architecture=arm64

[Output]
Format=sysext
ImageId=fex-emu
ManifestFormat=json
Output=%i_%v_%a
Overlay=yes

[Content]
BaseTrees=%O/base_%v_%a
Packages=
        binfmt-support
        ccache
        clang
        cmake
        g++-x86-64-linux-gnu
        git
        libc-bin
        libc6-dev-i386-amd64-cross
        lib32stdc++-14-dev-amd64-cross
        libgcc-14-dev-amd64-cross
        libgcc-14-dev-i386-cross
        libssl-dev
        libstdc++-12-dev-amd64-cross
        libstdc++-12-dev-arm64-cross
        libstdc++-12-dev-i386-cross
        lld
        llvm
        nasm
        ninja-build
        pkgconf
        python3-clang
        python3-setuptools
        qml6-module-qtqml-workerscript
        qml6-module-qtquick-controls
        qml6-module-qtquick-dialogs
        qml6-module-qtquick-layouts
        qml6-module-qtquick-templates
        qml6-module-qtquick-window
        qtdeclarative6-dev
        squashfs-tools
        squashfuse

[Validation]
Checksum=yes

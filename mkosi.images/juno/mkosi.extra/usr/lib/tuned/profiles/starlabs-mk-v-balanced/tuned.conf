#
# tuned configuration
#

[main]
summary=General non-specialized tuned profile

[modules]
cpufreq_conservative=+r

[cpu]
priority=10
governor=performance
energy_perf_bias=balance-power
energy_performance_preference=balance-power
boost=1

[acpi]
platform_profile=balanced

[audio]
timeout=10

[disk]
# Comma separated list of devices, all devices if commented out.
# devices=sda

[net]
# disable wake on lan on wifi interface
devices=wlp0s20f3
wake_on_lan=d

[sysfs]
# Power policy for pcie
/sys/module/pcie_aspm/parameters/policy=powersave
# Powersave for audio
/sys/module/snd_hda_intel/parameters/power_save=1
# Runtime PM for PCI Device Intel Corporation Alder Lake-N SPI (flash) Controller
/sys/bus/pci/devices/0000:00:1f.5/power/control=auto
# Runtime PM for PCI Device Intel Corporation GNA Scoring Accelerator 
/sys/bus/pci/devices/0000:00:08.0/power/control=auto
# Runtime PM for PCI Device Intel Corporation Alder Lake-N PCH CNVi WiFi
/sys/bus/pci/devices/0000:00:14.3/power/control=auto
# Runtime PM for PCI Device Silicon Motion, Inc. SM2263EN/SM2263XT (DRAM-less) NVMe SSD Controllers
/sys/bus/pci/devices/0000:01:00.0/power/control=auto
# Runtime PM for PCI Device Intel Corporation Alder Lake-N Processor Host Bridge/DRAM Registers
/sys/bus/pci/devices/0000:00:00.0/power/control=auto
# Runtime PM for PCI Device Intel Corporation Alder Lake-N PCH Shared SRAM
/sys/bus/pci/devices/0000:00:14.2/power/control=auto
# Runtime PM for PCI Device Intel Corporation Platform Monitoring Technology
/sys/bus/pci/devices/0000:00:0a.0/power/control=auto
# Runtime PM for PCI Device Intel Corporation Alder Lake-N PCH eSPI Controller
/sys/bus/pci/devices/0000:00:1f.0/power/control=auto
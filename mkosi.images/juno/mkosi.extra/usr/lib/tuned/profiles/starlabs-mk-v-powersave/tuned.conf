#
# tuned configuration
#

[main]
summary=A power profiles that balances power and performance on StarLabs MK V
include=starlabs-mk-v-balanced

[cpu]
governor=performance
energy_perf_bias=power
energy_performance_preference=power
boost=0

[sysfs]
# Power policy for pcie
/sys/module/pcie_aspm/parameters/policy=powersupersave